services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: presentsai
      POSTGRES_PASSWORD: presentsai
      POSTGRES_DB: presentsai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presentsai"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://presentsai:presentsai@postgres:5432/presentsai?sslmode=disable
      JWT_SECRET: dev-jwt-secret-change-in-prod
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  collab:
    build:
      context: ./services/collab
      dockerfile: Dockerfile
    environment:
      PORT: "8081"
    ports:
      - "8081:8081"

  realtime:
    build:
      context: ./services/realtime
      dockerfile: Dockerfile
    environment:
      PORT: "8082"
    ports:
      - "8082:8082"

  assets:
    build:
      context: ./services/assets
      dockerfile: Dockerfile
    environment:
      PORT: "8083"
      STORAGE_PATH: /app/uploads
    ports:
      - "8083:8083"
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_COLLAB_URL: ws://localhost/ws/collab
      NEXT_PUBLIC_REALTIME_URL: ws://localhost/ws/realtime
      NEXT_PUBLIC_ASSETS_URL: http://localhost/assets
      INTERNAL_API_URL: http://api:8080
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - collab
      - realtime
      - assets
      - web

volumes:
  postgres_data:
  uploads:
