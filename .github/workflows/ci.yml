name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        working-directory: web
        run: npm ci --legacy-peer-deps
      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit
      - name: ESLint
        working-directory: web
        run: npm run lint
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/api/go.sum
      - name: Go vet (all services)
        run: |
          for svc in api collab realtime assets; do
            echo "== vet $svc ==" && (cd services/$svc && go vet ./...)
          done

  web-unit:
    name: Web Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        working-directory: web
        run: npm ci --legacy-peer-deps
      - name: Run Vitest with coverage gate
        working-directory: web
        run: npm run test:coverage

  go-unit:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/api/go.sum
      - name: Test all Go services
        run: |
          for svc in api collab realtime assets; do
            echo "== test $svc ==" && (cd services/$svc && go test ./...)
          done

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: |
          docker compose -f docker-compose.dev.yml up --build -d
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health > /dev/null; then echo "api up"; break; fi
            sleep 3
          done
          echo "Waiting for web (nginx)..."
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/login || echo 000)
            if [ "$code" = "200" ]; then echo "web up"; break; fi
            sleep 3
          done
      - name: Warm up dev-server routes
        # The web container runs `next dev`, which compiles each route on its
        # first request. The editor route ships ~515 kB of JS (Fabric.js + Yjs)
        # and its first compile can take tens of seconds — long enough to blow
        # the Playwright per-action timeout and make the editor specs flaky.
        # Pre-compile the heavy routes here so the test window never pays that
        # one-time cost. Auth is client-side, so an unauthenticated GET still
        # forces the route bundle to compile.
        run: |
          for route in /login /dashboard /editor/warmup /present/warmup /view/warmup; do
            echo "warming $route ..."
            curl -s -o /dev/null -w "  %{http_code} in %{time_total}s\n" \
              --max-time 120 "http://localhost$route" || true
          done
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - name: Install E2E deps
        working-directory: e2e
        run: npm install
      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost
          CI: "true"
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --tail 100
