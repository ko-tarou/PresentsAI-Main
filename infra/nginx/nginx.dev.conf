events {
    worker_connections 1024;
}

http {
    upstream api_upstream    { server api:8080; }
    upstream collab_upstream { server collab:8081; }
    upstream rt_upstream     { server realtime:8082; }
    upstream assets_upstream { server assets:8083; }
    upstream web_upstream    { server web:3000; }

    server {
        listen 80;

        location /api/ {
            proxy_pass         http://api_upstream/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /ws/collab/ {
            proxy_pass         http://collab_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400;
        }

        location /ws/realtime/ {
            proxy_pass         http://rt_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400;
        }

        location /assets/ {
            proxy_pass       http://assets_upstream/;
            proxy_set_header Host        $host;
            proxy_set_header X-Real-IP   $remote_addr;
        }

        location / {
            proxy_pass         http://web_upstream/;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
